<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Logo Preview</title>
  <style>
    html, body { overflow: hidden; height: 100vh; width: 100vw; margin: 0; background: #000; }
    canvas { height: 100vh; width: 100vw; display: block; position: absolute; top: 0; left: 0; pointer-events: none; }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { EffectComposer } from 'https://esm.sh/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://esm.sh/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://esm.sh/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';
import { STLLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/STLLoader.js';

// Scene Setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(0, 0, 1);
scene.add(light);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.02, 0.7);
composer.addPass(bloom);

// Container for the logo
const logoGroup = new THREE.Group();
scene.add(logoGroup);

// Load STL
const loader = new STLLoader();
loader.load('shredsauce.stl', (geometry) => {
  geometry.computeVertexNormals();
  geometry.center(); // Pivot from the center
  
  geometry.computeBoundingBox();
  const bbox = geometry.boundingBox;
  const minY = bbox.min.y;
  const maxY = bbox.max.y;
  const height = Math.max(maxY - minY, 1e-6);

  const bottomColor = new THREE.Color(0xff7105); 
  const topColor = new THREE.Color(0xff913d);

  // Mesh Colors
  const pos = geometry.attributes.position;
  const count = pos.count;
  const colors = new Float32Array(count * 3);
  const tmp = new THREE.Color();

  for (let i = 0; i < count; i++) {
    const y = pos.getY(i);
    let t = (y - minY) / height;
    const jitter = (Math.sin(i * 12.9898) * 43758.5453 % 1) * 0.03;
    t = THREE.MathUtils.clamp(t + jitter, 0, 1);
    tmp.copy(bottomColor).lerp(topColor, t);
    colors[i * 3 + 0] = tmp.r;
    colors[i * 3 + 1] = tmp.g;
    colors[i * 3 + 2] = tmp.b;
  }
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.MeshStandardMaterial({
    vertexColors: true,
    metalness: 0.2,
    roughness: 0.8,
    side: THREE.DoubleSide
  });

  const mesh = new THREE.Mesh(geometry, material);
  logoGroup.add(mesh);

  // Wireframe
  const wireGeo = new THREE.WireframeGeometry(geometry);
  const lineMaterial = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const wireframe = new THREE.LineSegments(wireGeo, lineMaterial);
  logoGroup.add(wireframe);

  // Scaling
  const size = new THREE.Vector3();
  bbox.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  logoGroup.scale.setScalar(2.5 / maxDim);

}, undefined, (err) => { console.error('Error loading STL:', err); });

// Mouse Tracking
const mouse = new THREE.Vector2();
const targetRotation = new THREE.Vector2();

window.addEventListener('mousemove', (event) => {
  // Normalize mouse coordinates (-1 to +1)
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
});

function animate() {
  requestAnimationFrame(animate);

  if (logoGroup) {
    // Subtle Lerp for smooth rotation
    targetRotation.x += (-mouse.y * 0.5 - targetRotation.x) * 0.05;
    targetRotation.y += (mouse.x * 0.5 - targetRotation.y) * 0.05;

    logoGroup.rotation.x = targetRotation.x;
    logoGroup.rotation.y = targetRotation.y;
    
    // Idle floating effect
    logoGroup.position.y = Math.sin(Date.now() * 0.002) * 0.1;
  }

  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

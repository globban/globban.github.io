    <title>Liquid Glass — Interactive Quad</title>
    <style>
        :root {
            --gw: 300px;
            --gh: 386px;
            --gap: 40px;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* The Background Iframe */
        #bg-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: -1; }
        
        /* The Refractive Glass Layer */
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* The UI Layer (Links/Icons) */
        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--gap);
            z-index: 2;
        }

        .card {
            width: var(--gw);
            height: var(--gh);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .card svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover svg {
            transform: scale(1.2) translateY(-10px);
        }

        .card button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            pointer-events: none; /* Let the <a> handle the click */
        }

        #splash {
  position: fixed;
  inset: 0;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.6s ease;
}

/* This wrapper applies the shimmer *clipped to the logo* */
.logo-mask {
  position: relative;
  display: inline-block;
  width: 300px;
  height: 300px;

  /* Use SVG as masking area */
  -webkit-mask-image: var(--logo);
  mask-image: var(--logo);
  mask-repeat: no-repeat;
  mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  -webkit-mask-size: contain;

  /* Center mask */
  mask-position: center;
  -webkit-mask-position: center;
}

/* Real logo under the mask (static) */
.logo {
  width: 100%;
  height: 100%;
  filter: brightness(0);
}

/* Shimmer layer strictly clipped into the logo shape */
.logo-mask::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    100deg,
    transparent 30%,
    rgba(255,255,255,0.7) 50%,
    transparent 80%
  );
  transform: translateX(-150%) skewX(-20deg);
  animation: shimmer 2s ease-out forwards;
}

@keyframes shimmer {
  to {
    transform: translateX(150%) skewX(-20deg);
  }
}
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.getElementById('gl');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const PARAMS = {
            gw: 300, gh: 386, gr: 60,
            thick: 56, bezel: 60, ior: 5.0,
            hoverScale: 1.08
        };

        const imagePool = [
            'balls-d_copy.jpg', 'curvy-d_copy.jpg', 'blender render/dreamlike-surreal-3840x2160-21336.jpg', 'blender render/ios-26-apple-4000x2182-23303.jpg', 'blender render/spacelogo_copy.jpg',
            'elijah-pilchard-hodv-NKAGu4-unsplash.jpg', 'lcd-rainbow-d_copy.jpg', 'blender render/Shapes.png'
        ];
        // Note: Replace these with valid URLs or Unsplash IDs if local files aren't available
        const randomImage = imagePool[Math.floor(Math.random() * imagePool.length)];

        let targetHover = -1;
        let hoverValues = [0, 0, 0, 0];

        const vertexShader = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const fragmentShader = `
            precision highp float;
            varying vec2 vUv;
            uniform vec2 uResolution;
            uniform vec2 uTextureRes;
            uniform sampler2D uBgTex;
            uniform vec2 uSize;
            uniform float uRadius;
            uniform float uThickness;
            uniform float uBezel;
            uniform float uIOR;
            uniform float uHoverValues[4];
            uniform float uHoverScale;

            vec2 getCoverUV(vec2 uv, vec2 screenRes, vec2 texRes) {
                float screenAspect = screenRes.x / screenRes.y;
                float texAspect = texRes.x / texRes.y;
                vec2 scale = (screenAspect > texAspect) ? vec2(1.0, texAspect / screenAspect) : vec2(screenAspect / texAspect, 1.0);
                return (uv - 0.5) * scale + 0.5;
            }

            float sdRoundedRect(vec2 p, vec2 halfSize, float r) {
                vec2 q = abs(p) - halfSize + r;
                return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
            }

            float surfaceHeight(float t) {
                return pow(1.0 - pow(1.0 - clamp(t, 0.0, 1.0), 4.0), 0.25);
            }

            void main() {
                vec2 screenPx = vUv * uResolution;
                vec2 halfSize = uSize * 0.5; 
                float gap = uSize.x + 40.0;
                float sd = 1e10;
                vec2 centerUsed = vec2(0.0);
                float hVal = 0.0;

                for(int i = 0; i < 4; i++) {
                    vec2 center = vec2(uResolution.x * 0.5 + (float(i) - 1.5) * gap, uResolution.y * 0.5);
                    float currentH = (i==0)?uHoverValues[0]:(i==1)?uHoverValues[1]:(i==2)?uHoverValues[2]:uHoverValues[3];
                    float scale = mix(1.0, uHoverScale, currentH);
                    float d = sdRoundedRect(screenPx - center, halfSize * scale, uRadius * scale);
                    if(d < sd) {
                        sd = d;
                        centerUsed = center;
                        hVal = currentH;
                    }
                }

                if (sd > 0.0) {
                    vec2 bgUV = getCoverUV(vUv, uResolution, uTextureRes);
                    vec3 bg = texture2D(uBgTex, bgUV).rgb;
                    float shadow = (1.0 - smoothstep(0.0, mix(25.0, 75.0, hVal), sd)) * mix(0.4, 0.1, hVal);
                    gl_FragColor = vec4(bg * (1.0 - shadow), 1.0);
                    return;
                }

                float t = clamp(-sd / uBezel, 0.0, 1.0);
                float h = surfaceHeight(t);
                float h2 = surfaceHeight(t + 0.01);
                float slope = (h2 - h) / 0.01 * (uThickness / uBezel);
                float refraction = h * uThickness * (slope - (slope / uIOR));

                float zoom = mix(1.0, 0.9, hVal);
                vec2 zoomedUV = (centerUsed / uResolution) + (vUv - (centerUsed / uResolution)) * zoom;
                vec2 grad = normalize(screenPx - centerUsed);
                vec2 refractedUV = getCoverUV(zoomedUV - (grad * refraction / uResolution), uResolution, uTextureRes);

                vec3 color = texture2D(uBgTex, refractedUV).rgb;
                color += smoothstep(0.0, 1.0, t) * smoothstep(1.0, 0.0, t) * mix(0.0, 0.15, hVal);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const loader = new THREE.TextureLoader();
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                uTextureRes: { value: new THREE.Vector2(1920, 1080) },
                uBgTex: { value: null },
                uSize: { value: new THREE.Vector2(PARAMS.gw, PARAMS.gh) },
                uRadius: { value: PARAMS.gr },
                uThickness: { value: PARAMS.thick },
                uBezel: { value: PARAMS.bezel },
                uIOR: { value: PARAMS.ior },
                uHoverValues: { value: hoverValues },
                uHoverScale: { value: PARAMS.hoverScale }
            }
        });

        loader.load(randomImage, (tex) => {
            material.uniforms.uBgTex.value = tex;
            material.uniforms.uTextureRes.value.set(tex.image.width, tex.image.height);
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

        // Sync HTML Hover with Shader
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => targetHover = parseInt(card.dataset.index));
            card.addEventListener('mouseleave', () => targetHover = -1);
        });

        function render() {
            for (let i = 0; i < 4; i++) {
                const target = (targetHover === i) ? 1.0 : 0.0;
                hoverValues[i] += (target - hoverValues[i]) * 0.1;
            }
            material.uniforms.uHoverValues.value = hoverValues;
            material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
        render();
    </script>

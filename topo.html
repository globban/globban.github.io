<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Snow Background</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Removed the hardcoded image here so JS can handle it */
            background-color: #001015;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            top: 40%;
            font-family: sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        // 1. Define the pool
        const imagePool = [
            'balls-d_copy.jpg', 
            'curvy-d_copy.jpg', 
            'blender render/dreamlike-surreal-3840x2160-21336.jpg', 
            'blender render/ios-26-apple-4000x2182-23303.jpg', 
            'blender render/spacelogo_copy.jpg',
            'elijah-pilchard-hodv-NKAGu4-unsplash.jpg', 
            'lcd-rainbow-d_copy.jpg', 
            'blender render/Shapes.png'
        ];

        // 2. Select a random image
        const randomImage = imagePool[Math.floor(Math.random() * imagePool.length)];

        // 3. Apply it to the background
        document.getElementById('particles-js').style.backgroundImage = `url('${randomImage}')`;

        // 4. Initialize Particles
      particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 20,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#ffffff"
                },
                "shape": {
                    "type": "circle"
                },
                "opacity": {
                    "value": 0, /* Changed from 0 to 0.5 so they are visible */
                    "random": false
                },
                "size": {
                    "value": 3,
                    "random": true
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 3,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Snow Background</title>

<style>
    html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000 url('grasslands.webp') center/cover no-repeat;
    }

    /* Background image */
    #bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 0 ;
    }

    /* Snow canvas */
    #snow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        pointer-events: none;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
       body {
            background: #000 url('sphere.jpg') center/cover no-repeat;
            #particle-canvas { display: none; }
       }
    }
</style>

</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 150; // Increased for better screen coverage

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor(isInitial = false) {
                this.init(isInitial);
            }

            init(isInitial) {
                this.x = Math.random() * canvas.width;
                // KEY CHANGE: If it's the first load, spread them vertically. 
                // Otherwise, reset them to just above the screen.
                this.y = isInitial ? Math.random() * canvas.height : -20;
                
                this.w = 2 + Math.random() * 3; // Even smaller for high-end feel
                this.h = 4 + Math.random() * 3;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.flip = Math.random() * Math.PI;
                this.flipSpeed = Math.random() * 0.02 + 0.01;
                this.horizontalSpeed = Math.random() * 1.2 - 0.6;
                this.verticalSpeed = Math.random() * 0.5 + 0.4;
                this.angle = Math.random() * 360;
                this.sway = Math.random() * 2;
                this.swaySpeed = Math.random() * 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                
                const flipScale = Math.abs(Math.cos(this.flip));
                
                // Using a more realistic petal pink/white
                ctx.fillStyle = `rgba(255, 192, 203, ${this.opacity})`;
                
                // Draw delicate petal
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.w, -this.h * flipScale, this.w * 1.5, this.h * flipScale, 0, this.h * flipScale);
                ctx.bezierCurveTo(-this.w * 1.5, this.h * flipScale, -this.w, -this.h * flipScale, 0, 0);
                ctx.fill();
                
                ctx.restore();
            }

            update() {
                this.y += this.verticalSpeed;
                this.x += this.horizontalSpeed + Math.sin(this.sway) * 0.5;
                this.sway += this.swaySpeed;
                this.flip += this.flipSpeed;
                this.angle += 0.3;

                // Reset logic
                if (this.y > canvas.height + 20) {
                    this.init(false); // Reset to top
                }
            }
        }

        function setup() {
            for (let i = 0; i < particleCount; i++) {
                // Pass 'true' so they start distributed across the screen
                particles.push(new Petal(true));
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(render);
        }

        setup();
        render();
    </script>
</body>
</html>
